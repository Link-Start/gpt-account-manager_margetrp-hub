<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT账号管理助手 - 工作区找回</title>
  <link rel="stylesheet" href="/styles.css?v={{APP_VERSION}}">
  <link rel="stylesheet" href="/forge-theme.css?v={{APP_VERSION}}">
  <script src="/shared/base.js?v={{APP_VERSION}}" defer></script>
  <script src="/recover.js?v={{APP_VERSION}}" defer></script>
</head>
<body>
  <main class="recover-page">
    <section class="panel recover-card">
      <div class="recover-head">
        <a class="brand" href="/" aria-label="GPT账号管理助手">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="23" height="23">
              <path d="M12 3 3.5 7.4 12 12l8.5-4.6L12 3Z"></path>
              <path d="m4 12 8 4.3 8-4.3"></path>
              <path d="m4 16.5 8 4.3 8-4.3"></path>
            </svg>
          </span>
          <span class="brand-copy">
            <strong>工作区找回</strong>
            <em>页面打不开、数据为空、切错空间时使用</em>
          </span>
        </a>
        <span class="recover-version">v{{APP_VERSION}}</span>
      </div>

      <div class="recover-current">
        <span>当前浏览器工作区</span>
        <strong id="currentWorkspace">-</strong>
      </div>

      <div class="recover-tools">
        <label>
          <span>手动输入工作区 ID</span>
          <input id="workspaceInput" autocomplete="off" placeholder="ws_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
        </label>
        <button id="checkWorkspaceBtn" class="primary" type="button">检查</button>
        <button id="adminListBtn" type="button">管理员列出服务器工作区</button>
      </div>

      <p id="recoverStatus" class="recover-status">正在读取本机浏览器历史工作区。</p>

      <div id="workspaceList" class="recover-list" aria-live="polite"></div>

      <section class="recover-backup" aria-labelledby="recoverBackupTitle">
        <div>
          <h2 id="recoverBackupTitle">备份 / 恢复当前工作区</h2>
          <p>导出当前浏览器保存的邮箱资料、分组、刷新队列和页面设置。密码可选，填写后备份文件会加密。</p>
        </div>
        <div class="recover-backup-grid">
          <label>
            <span>备份密码（可选）</span>
            <input id="backupPassword" type="password" autocomplete="new-password" placeholder="不填写则导出普通 JSON">
          </label>
          <button id="exportBackupBtn" class="primary" type="button">导出备份</button>
          <label class="inline-file-button recover-file-button" for="importBackupFile">
            导入备份
            <input id="importBackupFile" type="file" accept=".json,application/json">
          </label>
        </div>
      </section>

      <div class="recover-actions">
        <a class="github-link" href="/">返回首页</a>
        <a class="github-link" href="/mailboxes.html">邮箱管理</a>
        <a class="github-link" href="/refresh.html">凭证刷新</a>
      </div>
    </section>
  </main>
</body>
</html>
