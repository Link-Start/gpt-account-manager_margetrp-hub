name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          git archive --format=zip --output="gpt-account-manager-${GITHUB_REF_NAME}.zip" HEAD

      - name: Create release notes
        run: |
          {
            echo "## GPT账号管理助手 ${GITHUB_REF_NAME}"
            cat <<'EOF'

          本次发布重点：

          - 新增工作区找回页 `/recover.html`，支持当前浏览器工作区恢复、管理员查看服务器工作区摘要，以及本地导出 / 导入备份。
          - 备份恢复支持可选密码加密，恢复时会还原账号、分组、队列和常用设置，但不会导出管理员工具 token。
          - 修复新用户共享硬编码默认工作区的问题，避免不同浏览器实例互相看到同一个默认空间。
          - 版本号同步到当前发布号，前端静态资源会自动换新，减少浏览器继续缓存旧脚本的概率。
          - README 和更新记录已经同步到 1.3.0，中文主体说明继续保持一致。

          VPS 同步更新仍然推荐 Docker Compose：

          ```bash
          git pull --ff-only origin main
          docker compose up -d --build --force-recreate
          ```
          EOF
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes || true
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --latest \
            "gpt-account-manager-${GITHUB_REF_NAME}.zip"
