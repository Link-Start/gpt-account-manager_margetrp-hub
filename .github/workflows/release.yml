name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          git archive --format=zip --output="gpt-account-manager-${GITHUB_REF_NAME}.zip" HEAD

      - name: Create release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## GPT账号管理助手 v0.8.4

          本次发布重点：

          - 修复临时邮箱导入示例：选择临时邮箱时只显示 `邮箱----JWT` / `邮箱----JWT----分组`，不再混入 Outlook 四段格式。
          - “其他邮箱”入口补充 163、QQ、iCloud、Gmail、Yahoo 等 IMAP / POP3 示例，并统一首页、邮箱管理、刷新页和仪表盘命名。
          - 邮箱管理页导入弹窗会按服务类型动态切换示例，减少导入格式误判。
          - 服务端版本号统一读取 `package.json`，静态资源使用当前版本号，降低浏览器旧缓存影响。
          - README 更新中文主体介绍，补充演示地址、交流群二维码、Docker Compose 和同步升级说明。
          - 保留仪表盘、封禁邮件统计、工作区缓存、失败账号清理、Docker 部署和同步升级能力。

          VPS 同步更新仍然推荐 Docker Compose：

          ```bash
          git pull --ff-only origin main
          docker compose up -d --build --force-recreate
          ```
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" --yes || true
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            --latest \
            "gpt-account-manager-${GITHUB_REF_NAME}.zip"
